<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Android Development Study Guide</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1e1e1e;--sidebar:#252526;--card:#2d2d2d;--card-hover:#333;--border:#3c3c3c;--text:#d4d4d4;--text-dim:#888;--accent:#4fc3f7;--accent2:#64b5f6;--success:#4caf50;--error:#f44336;--warning:#ff9800;--purple:#c586c0;--green:#6a9955;--orange:#ce9178;--blue:#569cd6;--cyan:#4ec9b0;--yellow:#dcdcaa;--mono:'Cascadia Code','Fira Code','Consolas','Monaco',monospace}
.light-theme{--bg:#f8f9fa;--sidebar:#e9ecef;--card:#ffffff;--card-hover:#f1f3f5;--border:#dee2e6;--text:#212529;--text-dim:#6c757d;--accent:#0d6efd;--accent2:#3d8bfd;--success:#198754;--error:#dc3545;--warning:#fd7e14;--green:#198754;--orange:#e8590c;--blue:#0d6efd;--cyan:#0dcaf0;--yellow:#997404}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;transition:background .3s,color .3s;--font-scale:1}
#app{height:100vh;display:flex;flex-direction:column}
header{background:var(--sidebar);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0}
.header-left{display:flex;align-items:center;gap:12px}
.header-left h1{font-size:18px;font-weight:600;color:var(--text)}
.header-right{display:flex;gap:8px;align-items:center}
.header-right button{background:transparent;border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:4px;cursor:pointer;font-size:13px;transition:all .2s}
.header-right button:hover{background:var(--card);border-color:var(--accent)}
.theme-toggle{cursor:pointer;font-size:18px;padding:4px 8px;border:none;background:transparent}
.hamburger{display:none;background:transparent;border:1px solid var(--border);color:var(--text);font-size:20px;padding:4px 10px;border-radius:4px;cursor:pointer}
.layout{display:flex;flex:1;overflow:hidden}
#sidebar{width:280px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;transition:left .3s}
.sidebar-search{padding:8px 12px;border-bottom:1px solid var(--border)}
.sidebar-search input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:4px;font-size:12px;outline:none}
.sidebar-search input:focus{border-color:var(--accent)}
.sidebar-filters{padding:6px 12px;display:flex;gap:6px;border-bottom:1px solid var(--border)}
.sidebar-filters select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:3px 6px;border-radius:3px;font-size:11px;outline:none;flex:1}
#module-list{flex:1;padding:4px 0;overflow-y:auto}
.category-header{display:flex;align-items:center;padding:8px 14px;cursor:pointer;gap:6px;user-select:none;font-size:11px;text-transform:uppercase;letter-spacing:.8px;font-weight:700;color:var(--text-dim);transition:color .15s}
.category-header:hover{color:var(--text)}
.category-arrow{font-size:9px;transition:transform .2s;width:12px;color:var(--text-dim)}
.category-header.open .category-arrow{transform:rotate(90deg)}
.category-pct{margin-left:auto;font-size:10px;font-weight:400;color:var(--text-dim)}
.category-children{max-height:0;overflow:hidden;transition:max-height .25s ease}
.category-header.open+.category-children{max-height:2000px}
.module-item{display:flex;align-items:center;padding:8px 14px 8px 32px;cursor:pointer;gap:8px;border-left:3px solid transparent;transition:all .15s}
.module-item:hover{background:var(--card)}
.module-item.active{background:rgba(79,195,247,.1);border-left-color:var(--accent)}
.module-item.hidden{display:none}
.module-icon{font-size:16px;width:22px;text-align:center}
.module-info{flex:1;min-width:0}
.module-title{font-size:12px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.module-progress-bar{height:2px;background:var(--border);border-radius:2px;margin-top:3px;overflow:hidden}
.module-progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.module-pct{font-size:10px;color:var(--text-dim);min-width:28px;text-align:right}
.review-btn{margin:8px 12px;padding:8px;background:var(--warning);color:#000;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;text-align:center;display:none}
.review-btn.visible{display:block}
#overall-progress{padding:16px;border-top:1px solid var(--border)}
.overall-progress span{font-size:12px;color:var(--text-dim);display:block;margin-bottom:6px}
#main-content{flex:1;overflow-y:auto;padding:24px 32px 24px 32px}
.welcome{max-width:700px;margin:60px auto;text-align:center}
.welcome h2{font-size:28px;color:var(--text);margin-bottom:12px}
.welcome>p{color:var(--text-dim);margin-bottom:32px;line-height:1.6}
.welcome-stats{display:flex;gap:20px;justify-content:center;margin-bottom:32px;flex-wrap:wrap}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:20px 32px;text-align:center}
.stat-number{font-size:32px;font-weight:700;color:var(--accent);display:block}
.stat-label{font-size:12px;color:var(--text-dim);margin-top:4px;display:block}
.weak-areas{margin-bottom:24px}
.weak-areas h3{font-size:14px;color:var(--warning);margin-bottom:8px}
.weak-tags{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.weak-tag{background:rgba(255,152,0,.15);color:var(--warning);padding:4px 12px;border-radius:12px;font-size:12px;cursor:pointer}
.weak-tag:hover{background:rgba(255,152,0,.25)}
.welcome-cta{color:var(--text-dim);font-size:14px}
.streak-badge{display:inline-flex;align-items:center;gap:4px;background:var(--card);border:1px solid var(--border);padding:4px 12px;border-radius:12px;font-size:12px;color:var(--warning);margin-bottom:24px}
/* Lesson View */
.lesson-view{max-width:1100px;margin:0 auto;position:relative}
.lesson-body{display:flex;gap:24px;align-items:flex-start}
.lesson-main{flex:1;min-width:0}
.lesson-toc{width:180px;flex-shrink:0;position:sticky;top:0;max-height:calc(100vh - 120px);overflow-y:auto;padding:12px;background:var(--sidebar);border:1px solid var(--border);border-radius:8px}
.lesson-toc-title{font-size:10px;text-transform:uppercase;letter-spacing:.8px;font-weight:700;color:var(--text-dim);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.lesson-toc a{display:block;font-size:11px;color:var(--text-dim);text-decoration:none;padding:3px 0 3px 10px;border-left:2px solid transparent;transition:all .15s;line-height:1.4}
.lesson-toc a:hover{color:var(--text);border-left-color:var(--text-dim)}
.lesson-toc a.active{color:var(--accent);border-left-color:var(--accent)}
@media(max-width:1000px){.lesson-toc{display:none}}
.lesson-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.lesson-header h2{font-size:24px}
.lesson-content{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:24px;line-height:1.8;font-size:calc(14px * var(--font-scale));margin-bottom:20px}
.lesson-content h3{color:var(--accent);margin:16px 0 8px;font-size:16px}
.lesson-content h3:first-child{margin-top:0}
.lesson-content code{background:rgba(79,195,247,.1);padding:1px 6px;border-radius:3px;font-family:var(--mono);font-size:12px;color:var(--accent)}
.lesson-content ul{margin:8px 0 8px 20px}
.lesson-content li{margin-bottom:4px}
.lesson-content .lesson-code{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:12px;font-family:var(--mono);font-size:calc(12px * var(--font-scale));margin:8px 0;overflow-x:auto;white-space:pre;line-height:1.5}
.lesson-content table{width:100%;border-collapse:collapse;margin:12px 0;font-size:calc(13px * var(--font-scale))}
.lesson-content th{text-align:left;padding:6px 10px;border-bottom:2px solid var(--accent);color:var(--accent);font-weight:600}
.lesson-content td{padding:6px 10px;border-bottom:1px solid var(--border);vertical-align:top}
.lesson-content tr:hover{background:var(--card-hover)}
.lesson-content .diagram{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:16px;font-family:var(--mono);font-size:calc(11px * var(--font-scale));margin:12px 0;overflow-x:auto;white-space:pre;line-height:1.6;color:var(--cyan)}
.lesson-content .info-box{background:rgba(79,195,247,.06);border-left:3px solid var(--accent);padding:12px 16px;margin:12px 0;border-radius:0 4px 4px 0;font-size:calc(13px * var(--font-scale))}
.lesson-content .warn-box{background:rgba(255,152,0,.06);border-left:3px solid var(--warning);padding:12px 16px;margin:12px 0;border-radius:0 4px 4px 0;font-size:calc(13px * var(--font-scale))}
.lesson-content .section-divider{border:0;border-top:1px solid var(--border);margin:24px 0}
.lesson-content h4{color:var(--yellow);margin:14px 0 6px;font-size:14px}
.lesson-content .lesson-code .hl{color:var(--accent);font-weight:600}
.lesson-content .lesson-code .cmt{color:var(--green);font-style:italic}
.lesson-tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:2px solid var(--border)}
.lesson-tab{padding:8px 20px;cursor:pointer;font-size:13px;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--text-dim);transition:all .15s}
.lesson-tab:hover{color:var(--text)}
.lesson-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
/* Question View */
.q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.q-breadcrumb{font-size:12px;color:var(--text-dim)}
.q-meta{display:flex;gap:8px;align-items:center}
.q-difficulty{font-size:11px;padding:2px 8px;border-radius:10px;text-transform:uppercase;font-weight:600}
.q-difficulty.beginner{background:rgba(76,175,80,.2);color:var(--success)}
.q-difficulty.intermediate{background:rgba(255,152,0,.2);color:var(--warning)}
.q-difficulty.advanced{background:rgba(244,67,54,.2);color:var(--error)}
.q-type{font-size:11px;color:var(--text-dim);background:var(--card);padding:2px 8px;border-radius:10px}
.q-solved{font-size:11px;color:var(--success)}
.q-title{font-size:22px;margin-bottom:8px}
.q-description{color:var(--text);line-height:1.6;margin-bottom:20px;font-size:calc(14px * var(--font-scale))}
.mc-options{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.mc-option{background:var(--card);border:2px solid var(--border);border-radius:6px;padding:12px 16px;cursor:pointer;transition:all .15s;font-size:calc(14px * var(--font-scale));text-align:left}
.mc-option:hover{border-color:var(--accent);background:var(--card-hover)}
.mc-option.selected{border-color:var(--accent);background:rgba(79,195,247,.1)}
.mc-option.correct{border-color:var(--success);background:rgba(76,175,80,.1)}
.mc-option.incorrect{border-color:var(--error);background:rgba(244,67,54,.1)}
.mc-option.reveal-correct{border-color:var(--success);background:rgba(76,175,80,.15)}
.code-display{background:var(--bg);border:1px solid var(--border);border-radius:6px;overflow-x:auto;margin-bottom:16px}
.code-display pre{padding:16px;font-family:var(--mono);font-size:calc(13px * var(--font-scale));line-height:1.5;white-space:pre;color:var(--text)}
.blank-slot{background:rgba(79,195,247,.15);color:var(--accent);padding:1px 4px;border-radius:3px;border-bottom:2px solid var(--accent);min-width:60px;display:inline-block;text-align:center}
.blank-slot.filled{color:var(--text);background:rgba(79,195,247,.25)}
.blank-inputs{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.blank-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.blank-row label{font-size:13px;color:var(--accent);min-width:70px;font-family:var(--mono)}
.blank-row input{background:var(--card);border:1px solid var(--border);border-bottom:2px solid var(--accent);color:var(--text);font-family:var(--mono);font-size:14px;padding:6px 12px;border-radius:4px;width:280px;outline:none;transition:all .2s}
.blank-row input:focus{border-color:var(--accent2);box-shadow:0 0 0 2px rgba(100,181,246,.2)}
.blank-row input.correct{border-color:var(--success);border-bottom-color:var(--success)}
.blank-row input.incorrect{border-color:var(--error);border-bottom-color:var(--error)}
.blank-row .blank-hint{font-size:11px;color:var(--text-dim);font-style:italic}
#editor-container{margin-bottom:16px;border-radius:6px;overflow:hidden;border:1px solid var(--border)}
#monaco-editor{width:100%;height:350px}
.trivia-input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:14px;padding:12px 16px;border-radius:6px;outline:none;resize:vertical;min-height:80px;font-family:inherit;line-height:1.5;margin-bottom:16px}
.trivia-input:focus{border-color:var(--accent)}
#action-bar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.btn{padding:8px 20px;border-radius:5px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover:not(:disabled){background:var(--accent2)}
.btn-secondary{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-secondary:hover:not(:disabled){background:var(--card);border-color:var(--text-dim)}
.btn-claude{background:linear-gradient(135deg,#d97706,#c2410c);color:#fff}
.btn-claude:hover:not(:disabled){opacity:.9}
.btn-success{background:var(--success);color:#fff}
.btn-nav{background:transparent;border:1px solid var(--border);color:var(--text);padding:8px 14px}
.btn-nav:hover{background:var(--card)}
.nav-spacer{flex:1}
#feedback-panel{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:16px 20px;margin-bottom:16px;animation:slideIn .2s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.feedback-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-weight:600;font-size:15px}
.feedback-header.success{color:var(--success)}
.feedback-header.error{color:var(--error)}
.feedback-header.info{color:var(--accent)}
.feedback-header.hint{color:var(--warning)}
.feedback-body{font-size:calc(13px * var(--font-scale));line-height:1.6;color:var(--text)}
.feedback-body code{background:rgba(79,195,247,.1);padding:1px 6px;border-radius:3px;font-family:var(--mono);font-size:12px;color:var(--accent)}
.feedback-check{display:flex;align-items:flex-start;gap:8px;padding:4px 0}
.feedback-check.pass .check-icon{color:var(--success)}
.feedback-check.fail .check-icon{color:var(--error)}
.claude-loading{display:flex;align-items:center;gap:10px;color:var(--text-dim);padding:12px 0}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100}
.modal-content{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:24px;width:500px;max-height:80vh;overflow-y:auto}
.modal-content.modal-large{width:750px}
.modal-content h2{font-size:18px;margin-bottom:16px}
.setting-row{margin-bottom:16px}
.setting-row label{display:block;font-size:13px;margin-bottom:6px;color:var(--text-dim)}
.setting-row input[type="password"],.setting-row input[type="text"]{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:4px;font-size:14px;outline:none}
.setting-row input:focus{border-color:var(--accent)}
.setting-hint{font-size:11px;color:var(--text-dim);margin-top:4px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.progress-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.progress-card{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:14px;cursor:pointer;transition:all .15s}
.progress-card:hover{border-color:var(--accent)}
.progress-card h4{font-size:13px;margin-bottom:6px}
.progress-card .pc-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:4px}
.progress-card .pc-fill{height:100%;border-radius:3px;transition:width .3s}
.progress-card .pc-stats{font-size:11px;color:var(--text-dim)}
.hl-keyword{color:var(--blue)}
.hl-string{color:var(--orange)}
.hl-comment{color:var(--green);font-style:italic}
.hl-annotation{color:var(--yellow)}
.hl-number{color:#b5cea8}
.q-nav-dots{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.q-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;transition:all .15s;color:var(--text-dim)}
.q-dot:hover{border-color:var(--text-dim)}
.q-dot.active{border-color:var(--accent);color:var(--accent);background:rgba(79,195,247,.1)}
.q-dot.solved{border-color:var(--success);color:var(--success);background:rgba(76,175,80,.1)}
.solution-block{margin-top:12px;padding:12px 16px;background:rgba(76,175,80,.08);border:1px solid rgba(76,175,80,.3);border-radius:6px}
.solution-block h4{font-size:13px;color:var(--success);margin-bottom:8px}
.solution-block pre{font-family:var(--mono);font-size:12px;white-space:pre-wrap;line-height:1.5}
.diff-view{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.diff-col{background:var(--bg);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.diff-col h5{padding:8px 12px;font-size:11px;text-transform:uppercase;color:var(--text-dim);border-bottom:1px solid var(--border)}
.diff-col pre{padding:12px;font-family:var(--mono);font-size:11px;line-height:1.5;white-space:pre-wrap;max-height:300px;overflow-y:auto}
#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:200}
.review-badge{background:var(--warning);color:#000;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;margin-left:6px}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;color:var(--text-dim)}
.loading-screen .spinner{width:32px;height:32px;border-width:3px}
/* References & Learn More */
.lesson-references{margin-top:24px;padding-top:20px;border-top:2px solid var(--border)}
.lesson-references h3{font-size:15px;color:var(--accent);margin-bottom:12px}
.ref-links{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px}
.ref-link{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);text-decoration:none;font-size:13px;transition:all .15s;overflow:hidden}
.ref-link:hover{border-color:var(--accent);background:var(--card-hover)}
.ref-type{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:600;text-transform:uppercase;flex-shrink:0}
.ref-type.docs{background:rgba(79,195,247,.15);color:var(--accent)}
.ref-type.source{background:rgba(197,134,192,.15);color:var(--purple)}
.ref-type.video{background:rgba(244,67,54,.15);color:var(--error)}
.ref-type.article{background:rgba(76,175,80,.15);color:var(--success)}
.ref-type.github{background:rgba(220,220,170,.15);color:var(--yellow)}
.ref-link-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.learn-more{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.learn-more b{color:var(--accent);font-size:13px}
.learn-more ul{margin:6px 0 0 16px;list-style:none}
.learn-more li{margin-bottom:4px;font-size:13px}
.learn-more li::before{content:"→ ";color:var(--accent)}
.learn-more a{color:var(--accent2);text-decoration:none}
.learn-more a:hover{text-decoration:underline}
@media(max-width:768px){
  .hamburger{display:inline-block}
  #sidebar{position:fixed;left:-280px;top:0;bottom:0;z-index:50;transition:left .3s}
  #sidebar.open{left:0}
  .sidebar-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:49}
  .sidebar-overlay.visible{display:block}
  #main-content{padding:16px}
  .welcome-stats{flex-direction:column;align-items:center}
  .progress-grid{grid-template-columns:1fr}
  .diff-view{grid-template-columns:1fr}
  .q-title{font-size:18px}
  header{padding:8px 12px;flex-wrap:wrap;gap:8px}
  .header-left h1{font-size:14px}
  .header-right{flex-wrap:wrap;gap:4px}
  .header-right button{padding:4px 8px;font-size:11px}
  .theme-toggle{font-size:14px;padding:4px 6px}
  .modal-content{width:95vw;max-height:90vh;padding:16px;margin:8px}
  .modal-content.modal-large{width:95vw}
  .lesson-content{padding:14px;font-size:calc(13px * var(--font-scale))}
  .lesson-content .lesson-code{font-size:calc(11px * var(--font-scale));padding:8px}
  .lesson-content .diagram{font-size:calc(9px * var(--font-scale));padding:10px}
  .lesson-content table{font-size:calc(11px * var(--font-scale))}
  .lesson-content th,.lesson-content td{padding:4px 6px}
  .code-display pre{font-size:calc(11px * var(--font-scale))}
  .mc-option{padding:10px 12px;font-size:calc(13px * var(--font-scale))}
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-left">
      <button class="hamburger" onclick="toggleSidebar()">&#9776;</button>
      <span style="font-size:24px">&#x1F4F1;</span>
      <h1>Android Study Guide</h1>
    </div>
    <div class="header-right">
      <button class="theme-toggle" onclick="decreaseFontSize()" title="Smaller text" style="font-size:14px">A-</button>
      <button class="theme-toggle" onclick="increaseFontSize()" title="Larger text" style="font-size:18px">A+</button>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" id="theme-btn">&#x1F319;</button>
      <button onclick="showProgressModal()">Progress</button>
      <button onclick="showSettingsModal()">Settings</button>
    </div>
  </header>
  <div class="layout">
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
    <aside id="sidebar">
      <div class="sidebar-search"><input type="text" placeholder="Search questions..." id="search-input" oninput="filterModules()"></div>
      <div class="sidebar-filters">
        <select id="filter-difficulty" onchange="filterModules()"><option value="">All Levels</option><option value="beginner">Beginner</option><option value="intermediate">Intermediate</option><option value="advanced">Advanced</option></select>
        <select id="filter-type" onchange="filterModules()"><option value="">All Types</option><option value="multiple-choice">MC</option><option value="fill-blank">Fill Blank</option><option value="fix-bug">Fix Bug</option><option value="optimize">Optimize</option><option value="write-code">Write</option><option value="trivia">Concept</option></select>
      </div>
      <button class="review-btn" id="review-btn" onclick="startReviewMode()">&#x1F504; Review Due Questions (<span id="review-count">0</span>)</button>
      <div id="module-list"></div>
      <div id="overall-progress"></div>
    </aside>
    <main id="main-content">
      <div id="welcome-view"></div>
      <div id="lesson-view" style="display:none"></div>
      <div id="question-view" style="display:none">
        <div id="q-nav-dots" class="q-nav-dots"></div>
        <div id="question-header"></div>
        <div id="question-body"></div>
        <div id="editor-container" style="display:none"><div id="monaco-editor"></div></div>
        <div id="action-bar"></div>
        <div id="feedback-panel" style="display:none"></div>
      </div>
    </main>
  </div>
</div>
<canvas id="confetti-canvas"></canvas>
<div id="settings-modal" class="modal" style="display:none">
  <div class="modal-content">
    <h2>Settings</h2>
    <div class="setting-row">
      <label>Claude API Key</label>
      <input type="password" id="api-key-input" placeholder="sk-ant-...">
      <p class="setting-hint">Optional. Enables "Ask Claude" for AI-powered feedback. Stored locally only.</p>
    </div>
    <div class="setting-row">
      <label>Claude Model</label>
      <input type="text" id="model-input" value="claude-sonnet-4-20250514">
    </div>
    <div class="setting-row" style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border)">
      <label>Progress Management</label>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn btn-secondary" onclick="exportProgress()">Export</button>
        <button class="btn btn-secondary" onclick="document.getElementById('import-file').click()">Import</button>
        <input type="file" id="import-file" accept=".json" style="display:none" onchange="importProgress(event)">
      </div>
    </div>
    <div class="setting-row" style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
      <button class="btn btn-secondary" onclick="if(confirm('Reset all progress?')){resetProgress()}" style="border-color:var(--error);color:var(--error)">Reset All Progress</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('settings-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>
<div id="progress-modal" class="modal" style="display:none">
  <div class="modal-content modal-large">
    <h2>Progress Dashboard</h2>
    <div id="progress-content"></div>
    <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal('progress-modal')">Close</button></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
<script src="app.js"></script>
</body>
</html>
